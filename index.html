<!DOCTYPE html>
<html lang="fr">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FitLog — Mon Suivi</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --card: #12121a;
    --card2: #1a1a26;
    --accent: #e8ff47;
    --accent2: #47c8ff;
    --accent3: #ff6b47;
    --text: #f0f0f5;
    --muted: #6b6b8a;
    --border: #2a2a3f;
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    padding: 24px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }

  .logo span { color: var(--text); }

  .date-today {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    text-align: right;
  }

  /* NAV TABS */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }

  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    border: 1px solid transparent;
    transition: all 0.2s;
    color: var(--muted);
    background: transparent;
  }

  .tab.active {
    background: var(--accent);
    color: #0a0a0f;
    font-weight: 600;
  }

  .tab:not(.active):hover {
    border-color: var(--border);
    color: var(--text);
  }

  /* PAGES */
  .page { display: none; padding: 20px; animation: fadeIn 0.25s ease; }
  .page.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* SECTION TITLE */
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1.5px;
    margin-bottom: 16px;
    color: var(--text);
  }

  .section-title span { color: var(--accent); }

  /* TODAY FORM */
  .form-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
  }

  .form-date {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .form-date input[type="date"] {
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    flex: 1;
  }

  .form-date label { font-size: 13px; color: var(--muted); }

  .metrics-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }

  .metric-input {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    transition: border-color 0.2s;
  }

  .metric-input:focus-within {
    border-color: var(--accent);
  }

  .metric-input label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .metric-input .icon { font-size: 16px; margin-bottom: 4px; display: block; }

  .metric-input input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 22px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
  }

  .metric-input input::placeholder { color: var(--border); }

  .metric-unit {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* PHOTO UPLOAD */
  .photo-upload {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 16px;
    position: relative;
  }

  .photo-upload:hover { border-color: var(--accent); background: rgba(232,255,71,0.03); }
  .photo-upload input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .photo-upload .upload-icon { font-size: 28px; margin-bottom: 8px; }
  .photo-upload p { font-size: 13px; color: var(--muted); }
  .photo-upload strong { color: var(--accent); }

  .photo-previews {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }

  .photo-preview {
    width: 70px;
    height: 70px;
    border-radius: 10px;
    object-fit: cover;
    border: 2px solid var(--border);
    position: relative;
  }

  .photo-preview-wrap {
    position: relative;
    display: inline-block;
  }

  .photo-preview-wrap .remove-photo {
    position: absolute;
    top: -6px;
    right: -6px;
    width: 18px;
    height: 18px;
    background: var(--accent3);
    border-radius: 50%;
    border: none;
    color: white;
    font-size: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* NOTES */
  .notes-input {
    width: 100%;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 12px;
    resize: vertical;
    min-height: 70px;
    outline: none;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }

  .notes-input:focus { border-color: var(--accent2); }
  .notes-input::placeholder { color: var(--muted); }

  /* BUTTON */
  .btn-save {
    width: 100%;
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-save:hover { background: #f5ff80; transform: translateY(-1px); }
  .btn-save:active { transform: translateY(0); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent);
    color: #0a0a0f;
    padding: 12px 24px;
    border-radius: 30px;
    font-weight: 600;
    font-size: 14px;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* HISTORY */
  .history-filter {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
  }

  .filter-btn.active, .filter-btn:hover {
    border-color: var(--accent2);
    color: var(--accent2);
  }

  .history-list { display: flex; flex-direction: column; gap: 12px; }

  .history-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .history-card:hover { border-color: var(--card2); }

  .history-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
  }

  .history-date {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
  }

  .history-summary {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .summary-pill {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 10px;
    background: var(--card2);
    color: var(--muted);
  }

  .summary-pill.highlight { background: rgba(232,255,71,0.1); color: var(--accent); }

  .history-chevron { color: var(--muted); transition: transform 0.2s; font-size: 14px; }
  .history-card.open .history-chevron { transform: rotate(180deg); }

  .history-body {
    display: none;
    padding: 0 16px 16px;
    border-top: 1px solid var(--border);
  }

  .history-card.open .history-body { display: block; }

  .history-metrics {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding-top: 14px;
    margin-bottom: 12px;
  }

  .hm-item {
    background: var(--card2);
    border-radius: 10px;
    padding: 10px 8px;
    text-align: center;
  }

  .hm-icon { font-size: 16px; margin-bottom: 4px; }
  .hm-val { font-size: 18px; font-weight: 700; color: var(--text); }
  .hm-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

  .history-photos {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 10px;
  }

  .history-photo {
    width: 80px;
    height: 80px;
    border-radius: 10px;
    object-fit: cover;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform 0.2s;
  }

  .history-photo:hover { transform: scale(1.05); }

  .history-notes {
    margin-top: 10px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
    font-style: italic;
  }

  .btn-delete {
    margin-top: 12px;
    background: transparent;
    border: 1px solid rgba(255,107,71,0.3);
    color: var(--accent3);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .btn-delete:hover { background: rgba(255,107,71,0.1); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* STATS */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
  }

  .stat-card.full { grid-column: 1 / -1; }

  .stat-icon { font-size: 22px; margin-bottom: 8px; }
  .stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 1px;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 6px; }
  .stat-trend { font-size: 12px; margin-top: 6px; }
  .trend-up { color: #4dff91; }
  .trend-down { color: var(--accent3); }
  .trend-eq { color: var(--muted); }

  /* CHART */
  .chart-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
  }

  .chart-title {
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
    font-weight: 500;
  }

  canvas { width: 100% !important; max-height: 150px; }

  /* LIGHTBOX */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .lightbox.open { display: flex; }
  .lightbox img { max-width: 100%; max-height: 90vh; border-radius: 12px; object-fit: contain; }
  .lightbox-close {
    position: absolute;
    top: 16px;
    right: 16px;
    font-size: 28px;
    color: white;
    cursor: pointer;
    background: rgba(255,255,255,0.1);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* PERIOD STATS */
  .period-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
  }

  .period-tab {
    flex: 1;
    text-align: center;
    padding: 8px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
  }

  .period-tab.active {
    background: var(--card2);
    border-color: var(--accent2);
    color: var(--accent2);
  }
</style>
</head>
<body>

<header>
  <div class="logo">Fit<span>Log</span></div>
  <div class="date-today" id="headerDate"></div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('today')">📝 Saisie</div>
  <div class="tab" onclick="switchTab('history')">📋 Historique</div>
  <div class="tab" onclick="switchTab('stats')">📊 Stats</div>
  <div class="tab" onclick="switchTab('photos')">📷 Photos</div>
</div>

<!-- PAGE: SAISIE -->
<div class="page active" id="page-today">
  <div class="section-title">Entrée du <span>jour</span></div>
  <div class="form-card">
    <div class="form-date">
      <label>Date</label>
      <input type="date" id="entryDate">
    </div>

    <div class="metrics-grid">
      <div class="metric-input">
        <span class="icon">⚖️</span>
        <label>Poids</label>
        <input type="number" id="inputPoids" placeholder="70" step="0.1" min="0">
        <div class="metric-unit">kg</div>
      </div>
      <div class="metric-input">
        <span class="icon">💪</span>
        <label>Pompes</label>
        <input type="number" id="inputPompes" placeholder="0" min="0">
        <div class="metric-unit">reps</div>
      </div>
      <div class="metric-input">
        <span class="icon">🔥</span>
        <label>Abdos</label>
        <input type="number" id="inputAbdos" placeholder="0" min="0">
        <div class="metric-unit">reps</div>
      </div>
      <div class="metric-input">
        <span class="icon">🦵</span>
        <label>Squats</label>
        <input type="number" id="inputSquats" placeholder="0" min="0">
        <div class="metric-unit">reps</div>
      </div>
      <div class="metric-input" style="grid-column:1/-1">
        <span class="icon">👟</span>
        <label>Pas</label>
        <input type="number" id="inputPas" placeholder="0" min="0">
        <div class="metric-unit">pas</div>
      </div>
    </div>

    <div class="photo-upload" id="photoUploadZone">
      <input type="file" accept="image/*" multiple id="photoInput" onchange="handlePhotos(this)">
      <div class="upload-icon">📸</div>
      <p><strong>Ajouter des photos</strong><br>Glisser ou cliquer</p>
    </div>
    <div class="photo-previews" id="photoPreviews"></div>

    <textarea class="notes-input" id="inputNotes" placeholder="Notes du jour... comment tu te sens, conditions, remarques..."></textarea>

    <button class="btn-save" onclick="saveEntry()">ENREGISTRER</button>
  </div>
</div>

<!-- PAGE: HISTORIQUE -->
<div class="page" id="page-history">
  <div class="section-title">Mon <span>Historique</span></div>
  <div class="history-filter">
    <button class="filter-btn active" onclick="filterHistory('all', this)">Tout</button>
    <button class="filter-btn" onclick="filterHistory('7', this)">7 jours</button>
    <button class="filter-btn" onclick="filterHistory('30', this)">30 jours</button>
    <button class="filter-btn" onclick="filterHistory('90', this)">3 mois</button>
  </div>
  <div class="history-list" id="historyList"></div>
</div>

<!-- PAGE: STATS -->
<div class="page" id="page-stats">
  <div class="section-title">Mes <span>Stats</span></div>
  <div class="period-tabs">
    <button class="period-tab active" onclick="switchPeriod('7', this)">7j</button>
    <button class="period-tab" onclick="switchPeriod('30', this)">30j</button>
    <button class="period-tab" onclick="switchPeriod('90', this)">3m</button>
    <button class="period-tab" onclick="switchPeriod('365', this)">1an</button>
    <button class="period-tab" onclick="switchPeriod('all', this)">Tout</button>
  </div>
  <div class="stats-grid" id="statsGrid"></div>
  <div class="chart-wrap">
    <div class="chart-title">Évolution du poids (kg)</div>
    <canvas id="weightChart"></canvas>
  </div>
  <div class="chart-wrap">
    <div class="chart-title">Entraînements (pompes + abdos + squats)</div>
    <canvas id="workoutChart"></canvas>
  </div>
</div>

<!-- PAGE: PHOTOS -->
<div class="page" id="page-photos">
  <div class="section-title">Galerie <span>Évolution</span></div>
  <div id="photoGallery"></div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─── STORAGE ────────────────────────────────────────────────
const STORAGE_KEY = 'fitlog_entries_v1';

function getEntries() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveEntries(entries) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}

// ─── STATE ───────────────────────────────────────────────────
let pendingPhotos = []; // base64 strings
let currentPeriod = '7';

// ─── INIT ────────────────────────────────────────────────────
function init() {
  const now = new Date();
  document.getElementById('headerDate').innerHTML =
    now.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });

  const today = now.toISOString().split('T')[0];
  document.getElementById('entryDate').value = today;

  renderHistory('all');
  renderStats('7');
  renderPhotoGallery();
}

// ─── TAB SWITCHING ────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    const tabs = ['today', 'history', 'stats', 'photos'];
    t.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');

  if (tab === 'history') renderHistory(document.querySelector('.filter-btn.active')?.dataset?.filter || 'all');
  if (tab === 'stats') renderStats(currentPeriod);
  if (tab === 'photos') renderPhotoGallery();
}

// ─── PHOTOS (UPLOAD) ─────────────────────────────────────────
function handlePhotos(input) {
  const files = Array.from(input.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      pendingPhotos.push(e.target.result);
      renderPreviews();
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function renderPreviews() {
  const wrap = document.getElementById('photoPreviews');
  wrap.innerHTML = pendingPhotos.map((src, i) => `
    <div class="photo-preview-wrap">
      <img class="photo-preview" src="${src}">
      <button class="remove-photo" onclick="removePhoto(${i})">✕</button>
    </div>
  `).join('');
}

function removePhoto(i) {
  pendingPhotos.splice(i, 1);
  renderPreviews();
}

// ─── SAVE ENTRY ───────────────────────────────────────────────
function saveEntry() {
  const date = document.getElementById('entryDate').value;
  if (!date) { showToast('⚠️ Choisissez une date !'); return; }

  const entry = {
    id: Date.now(),
    date,
    poids: parseFloat(document.getElementById('inputPoids').value) || null,
    pompes: parseInt(document.getElementById('inputPompes').value) || 0,
    abdos: parseInt(document.getElementById('inputAbdos').value) || 0,
    squats: parseInt(document.getElementById('inputSquats').value) || 0,
    pas: parseInt(document.getElementById('inputPas').value) || 0,
    notes: document.getElementById('inputNotes').value.trim(),
    photos: [...pendingPhotos],
  };

  const entries = getEntries();
  // Check if entry for same date already exists → update
  const idx = entries.findIndex(e => e.date === date);
  if (idx >= 0) {
    // Merge photos
    entry.photos = [...(entries[idx].photos || []), ...entry.photos];
    entries[idx] = entry;
    showToast('✅ Entrée mise à jour !');
  } else {
    entries.unshift(entry);
    showToast('✅ Entrée enregistrée !');
  }

  saveEntries(entries);

  // Reset
  pendingPhotos = [];
  renderPreviews();
  document.getElementById('inputPoids').value = '';
  document.getElementById('inputPompes').value = '';
  document.getElementById('inputAbdos').value = '';
  document.getElementById('inputSquats').value = '';
  document.getElementById('inputPas').value = '';
  document.getElementById('inputNotes').value = '';
}

// ─── HISTORY ─────────────────────────────────────────────────
function filterHistory(period, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  btn.dataset.filter = period;
  renderHistory(period);
}

function renderHistory(period) {
  let entries = getEntries();

  if (period !== 'all') {
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - parseInt(period));
    const cutStr = cutoff.toISOString().split('T')[0];
    entries = entries.filter(e => e.date >= cutStr);
  }

  const list = document.getElementById('historyList');
  if (!entries.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📭</div>
      <p>Aucune entrée pour cette période.<br>Commencez à saisir vos données !</p>
    </div>`;
    return;
  }

  list.innerHTML = entries.map(entry => `
    <div class="history-card" id="hc-${entry.id}">
      <div class="history-card-header" onclick="toggleCard('${entry.id}')">
        <div>
          <div class="history-date">${formatDate(entry.date)}</div>
          <div class="history-summary" style="margin-top:4px">
            ${entry.poids ? `<span class="summary-pill highlight">⚖️ ${entry.poids} kg</span>` : ''}
            ${entry.pompes ? `<span class="summary-pill">💪 ${entry.pompes}</span>` : ''}
            ${entry.abdos ? `<span class="summary-pill">🔥 ${entry.abdos}</span>` : ''}
            ${entry.squats ? `<span class="summary-pill">🦵 ${entry.squats}</span>` : ''}
            ${entry.pas ? `<span class="summary-pill">👟 ${entry.pas.toLocaleString()}</span>` : ''}
            ${entry.photos?.length ? `<span class="summary-pill">📸 ${entry.photos.length}</span>` : ''}
          </div>
        </div>
        <span class="history-chevron">▼</span>
      </div>
      <div class="history-body">
        <div class="history-metrics">
          <div class="hm-item"><div class="hm-icon">⚖️</div><div class="hm-val">${entry.poids ?? '—'}</div><div class="hm-label">kg</div></div>
          <div class="hm-item"><div class="hm-icon">💪</div><div class="hm-val">${entry.pompes || '—'}</div><div class="hm-label">pompes</div></div>
          <div class="hm-item"><div class="hm-icon">🔥</div><div class="hm-val">${entry.abdos || '—'}</div><div class="hm-label">abdos</div></div>
          <div class="hm-item"><div class="hm-icon">🦵</div><div class="hm-val">${entry.squats || '—'}</div><div class="hm-label">squats</div></div>
          <div class="hm-item" style="grid-column:2/-1"><div class="hm-icon">👟</div><div class="hm-val">${entry.pas ? entry.pas.toLocaleString() : '—'}</div><div class="hm-label">pas</div></div>
        </div>
        ${entry.notes ? `<div class="history-notes">"${entry.notes}"</div>` : ''}
        ${entry.photos?.length ? `<div class="history-photos">${entry.photos.map(src => `<img class="history-photo" src="${src}" onclick="openLightbox('${src}')" >`).join('')}</div>` : ''}
        <button class="btn-delete" onclick="deleteEntry(${entry.id})">🗑 Supprimer cette entrée</button>
      </div>
    </div>
  `).join('');
}

function toggleCard(id) {
  document.getElementById('hc-' + id)?.classList.toggle('open');
}

function deleteEntry(id) {
  if (!confirm('Supprimer cette entrée ?')) return;
  const entries = getEntries().filter(e => e.id !== id);
  saveEntries(entries);
  renderHistory('all');
  showToast('🗑 Entrée supprimée');
}

// ─── STATS ────────────────────────────────────────────────────
let weightChart = null, workoutChart = null;

function switchPeriod(period, btn) {
  currentPeriod = period;
  document.querySelectorAll('.period-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderStats(period);
}

function renderStats(period) {
  let entries = getEntries();
  if (period !== 'all') {
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - parseInt(period));
    const cutStr = cutoff.toISOString().split('T')[0];
    entries = entries.filter(e => e.date >= cutStr);
  }
  entries = [...entries].reverse(); // chronological order

  const grid = document.getElementById('statsGrid');

  if (!entries.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📊</div><p>Pas encore de données.</p></div>`;
    return;
  }

  const weights = entries.filter(e => e.poids).map(e => e.poids);
  const totalPompes = entries.reduce((s, e) => s + (e.pompes || 0), 0);
  const totalAbdos = entries.reduce((s, e) => s + (e.abdos || 0), 0);
  const totalSquats = entries.reduce((s, e) => s + (e.squats || 0), 0);
  const totalPas = entries.reduce((s, e) => s + (e.pas || 0), 0);
  const avgPas = entries.length ? Math.round(totalPas / entries.filter(e => e.pas > 0).length) : 0;
  const maxPompes = Math.max(...entries.map(e => e.pompes || 0));

  const firstW = weights[0], lastW = weights[weights.length - 1];
  const weightDiff = (weights.length >= 2) ? (lastW - firstW).toFixed(1) : null;
  const weightTrend = weightDiff !== null ? (weightDiff > 0 ? `trend-up +${weightDiff} kg` : weightDiff < 0 ? `trend-down ${weightDiff} kg` : 'trend-eq =') : null;

  grid.innerHTML = `
    ${weights.length ? `
    <div class="stat-card">
      <div class="stat-icon">⚖️</div>
      <div class="stat-val">${lastW}</div>
      <div class="stat-label">Dernier poids</div>
      ${weightTrend ? `<div class="stat-trend"><span class="${weightTrend.split(' ')[0]}">${weightTrend.split(' ').slice(1).join(' ')}</span> sur la période</div>` : ''}
    </div>` : ''}
    <div class="stat-card">
      <div class="stat-icon">💪</div>
      <div class="stat-val">${totalPompes.toLocaleString()}</div>
      <div class="stat-label">Pompes total</div>
      <div class="stat-sub">Record : ${maxPompes} en une séance</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🔥</div>
      <div class="stat-val">${totalAbdos.toLocaleString()}</div>
      <div class="stat-label">Abdos total</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🦵</div>
      <div class="stat-val">${totalSquats.toLocaleString()}</div>
      <div class="stat-label">Squats total</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">👟</div>
      <div class="stat-val">${totalPas.toLocaleString()}</div>
      <div class="stat-label">Pas total</div>
      <div class="stat-sub">Moy. ${avgPas.toLocaleString()} pas/j actif</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">📅</div>
      <div class="stat-val">${entries.length}</div>
      <div class="stat-label">Jours enregistrés</div>
    </div>
  `;

  drawWeightChart(entries);
  drawWorkoutChart(entries);
}

function drawWeightChart(entries) {
  const canvas = document.getElementById('weightChart');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * window.devicePixelRatio;
  canvas.height = 150 * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

  const W = canvas.offsetWidth, H = 150;
  const weightEntries = entries.filter(e => e.poids);
  ctx.clearRect(0, 0, W, H);

  if (weightEntries.length < 2) {
    ctx.fillStyle = '#6b6b8a';
    ctx.font = '13px DM Sans';
    ctx.textAlign = 'center';
    ctx.fillText('Pas assez de données', W/2, H/2);
    return;
  }

  const vals = weightEntries.map(e => e.poids);
  const min = Math.min(...vals) - 1, max = Math.max(...vals) + 1;
  const pad = { t: 16, b: 24, l: 36, r: 12 };
  const iW = W - pad.l - pad.r, iH = H - pad.t - pad.b;

  function xp(i) { return pad.l + (i / (weightEntries.length - 1)) * iW; }
  function yp(v) { return pad.t + (1 - (v - min) / (max - min)) * iH; }

  // Grid
  ctx.strokeStyle = '#2a2a3f';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + (i / 4) * iH;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l + iW, y); ctx.stroke();
    const v = max - ((max - min) / 4) * i;
    ctx.fillStyle = '#6b6b8a'; ctx.font = '10px DM Sans'; ctx.textAlign = 'right';
    ctx.fillText(v.toFixed(1), pad.l - 4, y + 3);
  }

  // Fill
  ctx.beginPath();
  ctx.moveTo(xp(0), yp(vals[0]));
  weightEntries.forEach((_, i) => { if (i > 0) ctx.lineTo(xp(i), yp(vals[i])); });
  ctx.lineTo(xp(weightEntries.length - 1), pad.t + iH);
  ctx.lineTo(pad.l, pad.t + iH);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, pad.t, 0, pad.t + iH);
  grad.addColorStop(0, 'rgba(232,255,71,0.18)');
  grad.addColorStop(1, 'rgba(232,255,71,0)');
  ctx.fillStyle = grad; ctx.fill();

  // Line
  ctx.beginPath();
  ctx.moveTo(xp(0), yp(vals[0]));
  weightEntries.forEach((_, i) => { if (i > 0) ctx.lineTo(xp(i), yp(vals[i])); });
  ctx.strokeStyle = '#e8ff47'; ctx.lineWidth = 2; ctx.stroke();

  // Dots
  weightEntries.forEach((_, i) => {
    ctx.beginPath();
    ctx.arc(xp(i), yp(vals[i]), 3.5, 0, Math.PI * 2);
    ctx.fillStyle = '#e8ff47'; ctx.fill();
  });
}

function drawWorkoutChart(entries) {
  const canvas = document.getElementById('workoutChart');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * window.devicePixelRatio;
  canvas.height = 150 * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

  const W = canvas.offsetWidth, H = 150;
  ctx.clearRect(0, 0, W, H);

  if (entries.length < 2) {
    ctx.fillStyle = '#6b6b8a';
    ctx.font = '13px DM Sans';
    ctx.textAlign = 'center';
    ctx.fillText('Pas assez de données', W/2, H/2);
    return;
  }

  const vals = entries.map(e => (e.pompes || 0) + (e.abdos || 0) + (e.squats || 0));
  const max = Math.max(...vals, 1);
  const pad = { t: 16, b: 8, l: 36, r: 12 };
  const iW = W - pad.l - pad.r, iH = H - pad.t - pad.b;

  const barW = Math.max(2, iW / vals.length - 3);

  vals.forEach((v, i) => {
    const x = pad.l + (i / vals.length) * iW + 1;
    const bH = (v / max) * iH;
    const y = pad.t + iH - bH;
    ctx.fillStyle = v > 0 ? '#47c8ff' : '#2a2a3f';
    ctx.beginPath();
    ctx.roundRect(x, y, barW, bH, [3, 3, 0, 0]);
    ctx.fill();
  });

  // y axis
  ctx.fillStyle = '#6b6b8a'; ctx.font = '10px DM Sans'; ctx.textAlign = 'right';
  ctx.fillText(max, pad.l - 4, pad.t + 6);
  ctx.fillText('0', pad.l - 4, pad.t + iH + 3);
}

// ─── PHOTO GALLERY ────────────────────────────────────────────
function renderPhotoGallery() {
  const entries = getEntries();
  const gallery = document.getElementById('photoGallery');
  const allPhotos = [];
  entries.forEach(e => {
    (e.photos || []).forEach(src => allPhotos.push({ src, date: e.date }));
  });

  if (!allPhotos.length) {
    gallery.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📷</div>
      <p>Aucune photo encore.<br>Ajoutez-en lors de vos saisies !</p>
    </div>`;
    return;
  }

  // Group by month
  const byMonth = {};
  allPhotos.forEach(p => {
    const m = p.date.substring(0, 7);
    if (!byMonth[m]) byMonth[m] = [];
    byMonth[m].push(p);
  });

  gallery.innerHTML = Object.keys(byMonth).sort().reverse().map(month => {
    const [yr, mo] = month.split('-');
    const label = new Date(yr, mo - 1, 1).toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
    return `
      <div style="margin-bottom:20px">
        <div class="section-title" style="font-size:16px;margin-bottom:10px">${label}</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
          ${byMonth[month].map(p => `
            <div>
              <img src="${p.src}" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;cursor:pointer;border:1px solid var(--border)"
                onclick="openLightbox('${p.src}')">
              <div style="font-size:10px;color:var(--muted);text-align:center;margin-top:3px">${formatDate(p.date)}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');
}

// ─── LIGHTBOX ─────────────────────────────────────────────────
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

// ─── UTILS ────────────────────────────────────────────────────
function formatDate(dateStr) {
  return new Date(dateStr + 'T12:00:00').toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ─── START ────────────────────────────────────────────────────
init();
